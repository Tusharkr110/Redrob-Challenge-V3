ai_usage_summary: |
  Used Claude and Gemini for architecture discussion, code review, and debugging.
  Used Cursor for refactoring and autocomplete.
  All scoring logic, penalty design, and signal weighting were authored by the team.
  No candidate data was fed to any external LLM.

methodology_summary: |
  Two-stage retrieve-and-rank pipeline.

  Stage 1 streams all 100k candidates and applies five honeypot hard-filters
  (impossible durations, founding-date violations, expert-skill inflation,
  overlapping current roles, future dates), then removes trap titles and
  out-of-India candidates without relocation intent. A lightweight heuristic
  score (experience fit, critical skill count, title match, response rate)
  selects the top 1,500 for deep scoring.

  Stage 2 encodes each candidate with all-MiniLM-L6-v2 (offline cache, 88MB)
  and computes a weighted base score: semantic similarity (0.35), per-cluster
  skill score with recency decay (0.30), experience fit (0.15), employer
  quality (0.12), location (0.08). A multiplicative behavioral modifier
  combines recruiter response rate, last-active recency, notice period,
  verification status, and open-to-work flag. Five proportional penalties
  suppress consulting lifers, shallow-AI wrappers, non-coding managers,
  title-chasers, and CV/speech specialists with no NLP exposure.

  Runtime on 100k candidates: ~2 minutes CPU. Honeypot rate in top 100: 0%.

